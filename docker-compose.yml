services:
  editor-server:
    image: blacknode-server:local
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    command:
      - python
      - -m
      - uvicorn
      - server:app
      - --host
      - 0.0.0.0
      - --port
      - "7777"
      - --app-dir
      - editor-server
    ports:
      - "7777:7777"
    env_file:
      - path: .env
        required: false
    environment:
      BLACKNODE_EDITOR_URL: http://editor-server:7777
    volumes:
      - ./workflows:/app/workflows
      - ./editor-server/runs:/app/editor-server/runs
    networks:
      - blacknode
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7777/node-types"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  editor:
    image: blacknode-editor:local
    build:
      context: .
      dockerfile: docker/Dockerfile.editor
    ports:
      - "3000:3000"
    depends_on:
      editor-server:
        condition: service_healthy
    networks:
      - blacknode
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  blacknode-mcp:
    image: blacknode-server:local
    command:
      - blacknode
      - mcp
      - --transport
      - streamable-http
      - --host
      - 0.0.0.0
      - --port
      - "9901"
      - --path
      - /mcp
      - --allowed-host
      - "localhost:*"
      - --allowed-host
      - "127.0.0.1:*"
      - --allowed-host
      - "blacknode-mcp:*"
      - --allowed-host
      - "host.docker.internal:*"
    ports:
      - "9901:9901"
    env_file:
      - path: .env
        required: false
    environment:
      BLACKNODE_EDITOR_URL: http://editor-server:7777
    volumes:
      - ./workflows:/app/workflows
      - ./editor-server/runs:/app/editor-server/runs
    networks:
      - blacknode
    depends_on:
      editor-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:9901/mcp"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  blacknode:
    driver: bridge
