name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  editor:
    name: Editor build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: editor/package-lock.json

      - name: Install editor dependencies
        working-directory: editor
        run: npm ci

      - name: Build editor
        working-directory: editor
        run: npm run build

  windows-bootstrap:
    name: Windows clean bootstrap
    runs-on: windows-latest
    env:
      BLACKNODE_BOOTSTRAP_ONLY: "1"
      BLACKNODE_PACKAGE_AUTO_UPDATE: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: editor/package-lock.json

      - name: Bootstrap through the public launcher
        shell: powershell
        run: .\start.ps1

      - name: Run the installed CLI demo
        shell: powershell
        run: .\.venv\Scripts\blacknode.exe demo

  rust:
    name: Rust check
    runs-on: ubuntu-latest
    env:
      PYO3_PYTHON: python

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust workspace
        run: cargo check
