services:
  editor-server:
    image: ${BLACKNODE_SERVER_IMAGE:-ghcr.io/temiroff/blacknode-server:latest}
    ports:
      - "7777:7777"
    env_file:
      - path: .env
        required: false
    environment:
      BLACKNODE_EDITOR_URL: http://editor-server:7777
    volumes:
      - ./workflows:/app/workflows
      - ./runs:/app/editor-server/runs

  editor:
    image: ${BLACKNODE_EDITOR_IMAGE:-ghcr.io/temiroff/blacknode-editor:latest}
    ports:
      - "3000:3000"
    depends_on:
      - editor-server

  blacknode-mcp:
    image: ${BLACKNODE_SERVER_IMAGE:-ghcr.io/temiroff/blacknode-server:latest}
    command:
      - blacknode
      - mcp
      - --transport
      - streamable-http
      - --host
      - 0.0.0.0
      - --port
      - "9901"
      - --path
      - /mcp
      - --allowed-host
      - "localhost:*"
      - --allowed-host
      - "127.0.0.1:*"
      - --allowed-host
      - "blacknode-mcp:*"
      - --allowed-host
      - "host.docker.internal:*"
    ports:
      - "9901:9901"
    env_file:
      - path: .env
        required: false
    environment:
      BLACKNODE_EDITOR_URL: http://editor-server:7777
    volumes:
      - ./workflows:/app/workflows
      - ./runs:/app/editor-server/runs
    depends_on:
      - editor-server
